<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Manual — UG Physics Laboratory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #0a0a0a; font-family: 'Inter', 'Segoe UI', sans-serif; }

        .viewer-wrap { position: relative; height: 100%; }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── Floating page badge ── */
        .page-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            background: rgba(6, 182, 212, 0.95);
            color: #fff;
            font-family: 'Space Grotesk', monospace, sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(6, 182, 212, 0.4), 0 0 0 1px rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: badgeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
            cursor: default;
            user-select: none;
        }

        .page-badge__number {
            background: rgba(0,0,0,0.25);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 18px;
            letter-spacing: 0.05em;
        }

        .page-badge__hint {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.85;
            max-width: 150px;
            line-height: 1.3;
        }

        @keyframes badgeIn {
            from { opacity: 0; transform: translateY(-12px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Back button ── */
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(8px);
            color: #aaa;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
            animation: badgeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }
        .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="viewer-wrap">
        <a href="index.html" class="back-btn">&larr; Back to Lab</a>

        <div class="page-badge" id="page-badge">
            <span>Navigate to page</span>
            <span class="page-badge__number" id="page-num"></span>
            <span class="page-badge__hint">Use the page input at the bottom of the viewer</span>
        </div>

        <iframe id="pdf-frame" allowfullscreen></iframe>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const page = parseInt(params.get('page'), 10) || 1;

        document.getElementById('page-num').textContent = page;
        document.getElementById('pdf-frame').src =
            'https://drive.google.com/file/d/1bX3sVJKrp1cQPuetedc3lWPWRndXXRR2/preview';

        // If no specific page requested (page 1), hide the badge
        if (page <= 1) {
            document.getElementById('page-badge').style.display = 'none';
        }
    </script>
</body>
</html>
