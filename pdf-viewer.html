<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Manual — UG Physics Laboratory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: #0a0a0a;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .viewer-wrap {
            position: relative;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── Floating page badge (Redesigned Toast) ── */
        .page-badge {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: badgeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
            cursor: pointer;
            user-select: none;
            max-width: 90vw;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .page-badge:active {
            transform: translateX(-50%) scale(0.97);
        }

        .page-badge__number {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 16px;
            font-family: monospace;
            font-weight: 700;
        }

        .page-badge__hint {
            opacity: 0.85;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .page-badge__hint strong {
            font-weight: 600;
            color: #fff;
        }

        .page-badge__dismiss {
            opacity: 0.5;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        /* Mobile Optimizations */
        @media (max-width: 600px) {
            .page-badge {
                bottom: 30px;
                padding: 10px 14px;
                flex-direction: column;
                text-align: center;
                gap: 8px;
            }

            .page-badge__number {
                font-size: 18px;
            }

            .page-badge__hint {
                font-size: 12px;
            }
        }

        @keyframes badgeIn {
            from {
                opacity: 0;
                transform: translate(-50%, 20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0) scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="viewer-wrap">
        <!-- Floating Toast Notification -->
        <div class="page-badge" id="page-badge"
            onclick="this.style.opacity='0'; setTimeout(()=>this.style.display='none',300);">
            <div class="page-badge__number" id="page-num"></div>
            <div class="page-badge__hint">
                <span><strong>Target Page</strong> &mdash; Use bottom viewer controls to jump</span>
                <span class="page-badge__dismiss">Tap to dismiss</span>
            </div>
        </div>

        <iframe id="pdf-frame" allowfullscreen></iframe>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const page = parseInt(params.get('page'), 10) || 1;

        document.getElementById('page-num').textContent = `PG ${page}`;
        document.getElementById('pdf-frame').src =
            'https://drive.google.com/file/d/1bX3sVJKrp1cQPuetedc3lWPWRndXXRR2/preview';

        // If no specific page requested (page 1), hide the badge entirely
        if (page <= 1) {
            document.getElementById('page-badge').style.display = 'none';
        }
    </script>
</body>

</html>
